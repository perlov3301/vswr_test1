<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zin->VSWR</title>
    <style>
      body {
        width: 96%;
        margin: 10px auto;
        /* background-color: grba(100, 100,100, 0.1); */
      }
      input {
        padding: 5px;
        border: 1px solid navy;
        border-radius: 5px;
        max-width: 110px;
      }
      .inline-inputs {
        display: flex;
        gap: 10px;
        /* align-items: center; */
        flex-wrap:wrap;
      }
      .inline-inputs input {
        flex:1;
        max-width:90px;
      }
      .inline-inputs label {
        font-weight: 500;
      }
      fieldset {
        background-color: rgba(100, 100, 100, 0.1);
        border: 1px solid navy;
        padding: 10px;
        border-radius: 0.5rem;
        legend {
          font-weight: 300;
          color: navy;
          background: grba(100, 125, 100, 0.2);
          border: 1px solid navy;
          border-radius: 0.3rem;
          padding: 0.02rem 0.2rem;
        }
      }
      button {
        font-weight: 400;
        border: 2px solid rgb(11, 11, 39);
        border-radius: 5px;
        background-color: rgb(55, 55, 176);
        color: white;
      }
      button:active {
        background-color: darkblue;
        border: 2px solid rgb(119, 119, 239);
      }
    </style>
    <!-- <link rel="stylesheet" href="styles.css"> -->
</head>
<body>
    <div class="container">
        <h1>parallel_vswr.html</h1>
        <form id="vswrForm">
            <label for="generator">generator Impedance (Ω):</label>
            <input type="number" 
              id="generatorR" 
              step="0.01" required>
            <br><br>
            <label for="frequency">frequency (MHz):</label>
            <input type="number" 
              id="frequency" 
              step="0.001" required>
            <br><br>
            <label for="">line1 is ended by short circuit; line2 is ended by complex load </label>
            <br><br>
            <div class="inline-inputs">
              <label for="line1_R">line1 impedance (Ω)</label>
              <input type="number" 
                id="line1_R" 
                step="0.0001" required>
              <label for="line1_L">line1 length (m)</label>
              <input type="number" 
                id="line1_L" 
                step="0.00001" required>
            </div>
            <br>
            <div class="inline-inputs">
              <label for="line2_R">line2 impedance (Ω)</label>
              <input type="number" 
                id="line2_R" 
                step="0.0001" required>
              <label for="line2_L">line2 length (m)</label>
              <input type="number" 
                id="line2_L" 
                step="0.00001" required>
            </div>
            <br>
            <label for="load_real">Load Impedance for line2: R(Ω):</label>
            <input type="number" 
              id="load_real" 
              step="0.001" required>
            <br><br>
            <label for="load_imag">Load Impedance for line2 X(Ω):</label>
            <input type="number" 
              id="load_imag" 
              step="0.1" required>
            <br><br>
            <button type="submit">calculate Zin</button>
        </form>
        <br>
        <fieldset>
          <legend>results</legend>
          <div id="result">Input Impedance:</div>
          <div id="result_vswr">VSWR:</div>

          <div id="statusIndicator" 
             class="status-indicator">Ready to Input</div>
         
        </fieldset>
        
        <br>
       <textarea id="explanation" 
          rows="7"
          cols="71"
          minheight="10rem"
          readonly></textarea>
    </div>
    <script type="module"
      src="parallel_vswr.js"></script>
</body>
</html>
